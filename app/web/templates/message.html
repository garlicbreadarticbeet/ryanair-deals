{% extends "base.html" %}
{% block title %}{{ heading }} — {{ settings.brand_name }}{% endblock %}
{% block content %}
<section class="section">
  <div class="container" style="max-width:480px">
    <div class="card center stack">
      <h1 style="font-size:26px">{{ heading }}</h1>
      <p class="muted">{{ message }}</p>
      <a class="btn" href="{{ link or '/' }}">{{ link_label or 'Naar home' }}</a>
    </div>
  </div>
</section>
{% endblock %}
