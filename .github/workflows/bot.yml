name: Bot (commando's)

# OPTIONEEL alternatief voor de always-on bot op de Hetzner-server.
# Draai dit NIET tegelijk met die bot. Cron staat standaard uit; gebruik anders de worker-host.
on:
  # schedule:
  #   - cron: "*/5 * * * *"   # elke ~5 min — uncomment als dit je enige bot-runner is
  workflow_dispatch: {}

concurrency:
  group: bot
  cancel-in-progress: false

jobs:
  bot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements.txt
      - name: Poll & beantwoord commando's
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        run: python bot.py
