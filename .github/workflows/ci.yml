name: CI

# Bewijst acceptatiecriterium 6: migraties draaien schoon op een lege DB + tests groen.
on:
  push: {}
  pull_request: {}
  workflow_dispatch: {}

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: ryanair
          POSTGRES_PASSWORD: ryanair
          POSTGRES_DB: ryanair
        ports:
          - "5433:5432"
        options: >-
          --health-cmd "pg_isready -U ryanair -d ryanair"
          --health-interval 5s --health-timeout 5s --health-retries 10
    env:
      DATABASE_URL: postgresql+psycopg://ryanair:ryanair@localhost:5433/ryanair
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements.txt
      - name: Migraties schoon op lege DB (upgrade -> downgrade -> upgrade)
        run: |
          alembic upgrade head
          alembic downgrade base
          alembic upgrade head
      - name: Seed
        run: python -m app.db.seed_airports
      - name: Tests
        run: pytest -q
