name: Scan + alerts (worker)

# OPTIONEEL alternatief voor de always-on worker op de Hetzner-server.
# Draai dit NIET tegelijk met die worker — dan krijg je dubbele alerts.
# De cron staat daarom standaard uit; activeer 'm alleen als dit je enige runner is.
on:
  # schedule:
  #   - cron: "0 */4 * * *"   # elke 4 uur — uncomment als dit je enige runner is
  workflow_dispatch: {}

concurrency:
  group: scan
  cancel-in-progress: false

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements.txt
      - name: Scan + alert (multi-user)
        # Vereist een bereikbare, gemigreerde + geseede Postgres via DATABASE_URL-secret.
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          RESEND_FROM: ${{ secrets.RESEND_FROM }}
          APP_BASE_URL: ${{ secrets.APP_BASE_URL }}
        run: python -m app.worker once
