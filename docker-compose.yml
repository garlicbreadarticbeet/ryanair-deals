# Volledige stack voor de deal-dienst (lokaal of op de Hetzner-server).
# Geïsoleerd (eigen volume + projectnaam) zodat een andere app op dezelfde server
# er geen last van heeft.
#
#   Alleen de database (voor tests/migraties):  docker compose up -d db
#   Volledige stack (Hetzner):                  docker compose up -d --build
#
# De app-services (migrate/worker/bot/web) lezen secrets uit .env (kopieer .env.example).
# DATABASE_URL wordt hier overschreven naar de interne 'db'-host (niet de 5433-hostpoort).

name: goedkoopvliegen

x-app: &app
  build: .
  env_file: .env
  environment:
    DATABASE_URL: postgresql+psycopg://ryanair:ryanair@db:5432/ryanair
  depends_on:
    migrate:
      condition: service_completed_successfully
  restart: unless-stopped

services:
  db:
    image: postgres:16-alpine
    container_name: gv_postgres
    environment:
      POSTGRES_USER: ryanair
      POSTGRES_PASSWORD: ryanair
      POSTGRES_DB: ryanair
    ports:
      # Host-poort 5433 (niet 5432) zodat een andere Postgres op dezelfde server
      # niet botst. Container-intern blijft het 5432.
      - "5433:5432"
    volumes:
      - gv_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ryanair -d ryanair"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  # Eenmalig: schema migreren + luchthavens/providers seeden, dan stoppen.
  migrate:
    build: .
    command: sh -c "python -m alembic upgrade head && python -m app.db.seed_airports"
    env_file: .env
    environment:
      DATABASE_URL: postgresql+psycopg://ryanair:ryanair@db:5432/ryanair
    depends_on:
      db:
        condition: service_healthy
    restart: "no"

  # Always-on: scan -> match -> notify, elke 4 uur.
  worker:
    <<: *app
    command: python -m app.worker run --interval 240

  # Always-on: Telegram-bot (onboarding + commando's).
  bot:
    <<: *app
    command: python bot.py --forever

  # Website + JSON-API. --proxy-headers zodat het echte client-IP (X-Forwarded-For van Caddy)
  # doorkomt — nodig voor de contact-rate-limit en correcte logging achter de proxy.
  web:
    <<: *app
    command: uvicorn app.web.main:app --host 0.0.0.0 --port 8000 --proxy-headers --forwarded-allow-ips=*
    # Handig lokaal; in productie kun je 8000 dichtzetten in de firewall (Caddy is de ingang).
    ports:
      - "8000:8000"

  # Reverse proxy + automatische HTTPS (Let's Encrypt). Alleen in productie: --profile prod.
  # Caddy is dan de enige publieke ingang; 'web' hoeft geen hostpoort meer te publiceren.
  caddy:
    image: caddy:2-alpine
    profiles: ["prod"]
    depends_on:
      - web
    ports:
      - "80:80"
      - "443:443"
    environment:
      SITE_DOMAIN: ${SITE_DOMAIN:-localhost}
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    restart: unless-stopped

volumes:
  gv_pgdata:
  caddy_data:
  caddy_config:
